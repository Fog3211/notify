# ============================================================
# 业务配置：数据源、关注标的、LLM、推送、调度。
# 密钥不在这里 —— 全部走 .env（见 .env.example）。
# ============================================================

# 运行时区与触发时间（仅 daemon/schedule 模式使用；cron/GitHub Actions 触发时忽略）
schedule:
  timezone: "Asia/Shanghai"
  daily_at: "07:00"            # 每日简报（北京时间），美股收盘后
  intraday_every_minutes: 60  # 盘中速报间隔（分钟），仅美股交易时段运行

# LLM：provider 可自由切换，模型可随时改（切换只需改 provider/model 两行 + 填对应 key）。
# provider 取值: groq | gemini | deepseek | anthropic | openai | dashscope
# 白嫖推荐: groq（免费、快）或 gemini（免费）；要质量好且便宜用 deepseek。
llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.3
  max_tokens: 4096
  # 各 provider 的 base_url / 对应 env key 在 app/llm/factory.py 注册；这里只选 provider/model。

# 采集：每个 source 一条；type=rss 无需 key。
# topic 用于把新闻分组喂给 AI（也用于推送分栏）。
sources:
  # ---------- AI ----------
  - name: "MIT Tech Review"
    type: rss
    topic: ai
    url: "https://www.technologyreview.com/feed/"
  - name: "VentureBeat AI"
    type: rss
    topic: ai
    url: "https://venturebeat.com/category/ai/feed/"
  - name: "Hacker News (AI)"
    type: rss
    topic: ai
    url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+GPU&points=50"

  # ---------- 美股科技 / 财经 ----------
  - name: "CNBC Technology"
    type: rss
    topic: us_tech
    url: "https://www.cnbc.com/id/19854910/device/rss/rss.html"
  - name: "Yahoo Finance"
    type: rss
    topic: finance
    url: "https://finance.yahoo.com/news/rssindex"
  - name: "CNBC Finance"
    type: rss
    topic: finance
    url: "https://www.cnbc.com/id/10000664/device/rss/rss.html"

  # ---------- 半导体 / 存储 / CPO（光模块）----------
  - name: "Tom's Hardware"
    type: rss
    topic: semiconductor
    url: "https://www.tomshardware.com/feeds/all"
  - name: "Semiconductor Engineering"
    type: rss
    topic: semiconductor
    url: "https://semiengineering.com/feed/"

  # ---------- 股票新闻 API（需 FINNHUB_API_KEY，留空则自动跳过）----------
  - name: "Finnhub Market News"
    type: finnhub_news
    topic: us_tech
    category: "technology"   # finnhub general/forex/crypto/merger 等

  # ---------- 重大事件：SEC 8-K（免 key，关注列表个股的 8-K 申报）----------
  - name: "SEC 8-K Filings"
    type: sec_8k
    topic: events

  # ---------- 币圈新闻（免 key RSS）----------
  - name: "CoinDesk"
    type: rss
    topic: crypto
    url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
  - name: "Cointelegraph"
    type: rss
    topic: crypto
    url: "https://cointelegraph.com/rss"
  - name: "Decrypt"
    type: rss
    topic: crypto
    url: "https://decrypt.co/feed"

# 关注标的（仅美股）：用于行情/异动监控，并作为给 AI 的上下文。
watchlist:
  tech:   ["NVDA", "MSFT", "GOOGL", "META", "AMZN", "AAPL", "TSLA", "PLTR", "ARM"]
  ai:     ["NVDA", "AMD", "SMCI", "AVGO", "TSM"]
  storage: ["MU", "WDC", "STX", "PSTG", "NTAP"]
  cpo:    ["AVGO", "MRVL", "COHR", "LITE", "POET"]   # 光模块/共封装光学

# 行情与异动监控（仅美股，免 key）
market:
  enabled: true
  # 行情主源 cnbc（CNBC 报价接口，含 10 日均量）；单标的失败自动切 Nasdaq 兜底。均免 key。
  source: "cnbc"
  snapshot_db: "data/market.sqlite"
  # 异动 AI 归因：有异动且配了 LLM key 时，关联近期新闻给每只个股一句话「为什么涨/跌」。
  # 无 key 自动跳过，速报仍正常推送（只是没有归因）。
  ai_attribution: true
  movers:
    daily_threshold_pct: 5.0    # |日内涨跌幅| ≥ 该值触发异动
    hourly_threshold_pct: 3.0   # |相邻快照涨跌幅| ≥ 该值触发异动
    volume_multiple: 3.0        # 成交量 ≥ 历史均量×该倍数触发（无均量数据时跳过此项）
    cooldown_hours: 4           # 同标的同方向冷却期内不重复推送

# 币圈行情与暴涨暴跌监控（仅主流币，免 key，24/7 运行）
crypto:
  enabled: true
  # 主源 coingecko（全球可用）；失败自动切 binance 兜底。均免 key。
  source: "coingecko"
  watchlist: ["BTC", "ETH", "SOL", "BNB", "XRP", "DOGE", "ADA", "AVAX", "LINK", "TRX"]
  snapshot_db: "data/crypto.sqlite"
  ai_attribution: true          # 异动时关联币圈新闻做 AI 归因（无 LLM key 自动跳过）
  movers:
    daily_threshold_pct: 10.0   # 币圈波动大，24h 涨跌幅阈值设高些
    hourly_threshold_pct: 5.0
    volume_multiple: 3.0
    cooldown_hours: 4

# 去重 & 过滤
processing:
  # 只看最近 N 小时内发布的新闻（避免每天重复推旧闻）
  lookback_hours: 30
  # 每个 topic 最多送多少条进 AI（控 token / 成本）
  max_items_per_topic: 15
  # 去重指纹存储
  dedup_db: "data/seen.sqlite"
  # 已推送指纹保留天数（超期自动清理）
  dedup_retention_days: 14

# 推送渠道：enabled 控制开关；缺对应 env 密钥会在启动时报警告并跳过。
notifiers:
  feishu:
    enabled: true
    keyword: "AI测试"     # 机器人若设了自定义关键词，填这里，notifier 会自动注入到消息
  pushplus:
    enabled: false        # 暂无 token，先关掉
    # PushPlus 模板: html | markdown | txt
    template: "markdown"
  serverchan:
    enabled: false

# 报告渲染
report:
  title: "📈 每日 AI · 美股 · 财经简报"
  # 是否在末尾附「数据源/条数」统计
  show_stats: true
