# 每日简报：美股收盘后跑一次（采集→AI 分析→推送）。
# 免费：公开仓库 Actions 不计费；私有仓库每月有免费额度。
name: daily-brief

on:
  schedule:
    - cron: "0 23 * * *"   # 23:00 UTC ≈ 北京时间 07:00（美股收盘后）
  workflow_dispatch: {}      # 也可手动触发

# 密钥放仓库 Settings → Secrets，按你启用的项配置即可
env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
  FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
  PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
  SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      # 持久化去重库：跨运行保留「已推送」记忆，避免重复推送
      - uses: actions/cache@v4
        with:
          path: data
          key: notify-state-${{ github.run_id }}
          restore-keys: notify-state-
      - run: python -m app run
